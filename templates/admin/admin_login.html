{% extends "base.html" %}

{% block title %}Admin Login - Conect Us{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        min-height: calc(100vh - 200px);
        min-height: calc(100dvh - 200px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 50px 20px;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    }
    
    .auth-box {
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 50px rgba(0,0,0,0.3);
        padding: 50px;
        width: 100%;
        max-width: 450px;
    }
    
    .auth-header {
        text-align: center;
        margin-bottom: 40px;
    }
    
    .auth-header h2 {
        font-size: 32px;
        color: #1a1a2e;
        margin-bottom: 10px;
    }
    
    .auth-header p {
        color: #666;
    }
    
    .admin-badge {
        display: inline-block;
        background: #1a1a2e;
        color: white;
        padding: 5px 15px;
        border-radius: 15px;
        font-size: 12px;
        margin-bottom: 15px;
    }
    
    .form-group {
        margin-bottom: 25px;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-weight: 500;
    }
    
    .form-group input {
        width: 100%;
        padding: 15px;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        font-size: 16px;
        transition: border-color 0.3s;
    }
    
    .form-group input:focus {
        outline: none;
        border-color: #1a1a2e;
    }
    
    .btn-login {
        width: 100%;
        padding: 15px;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.3s, box-shadow 0.3s;
    }
    
    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(26, 26, 46, 0.4);
    }
    
    .back-link {
        text-align: center;
        margin-top: 25px;
    }
    
    .back-link a {
        color: #666;
        text-decoration: none;
    }
    
    .back-link a:hover {
        color: #1a1a2e;
    }

    @media (max-width: 600px) {
        .auth-container {
            padding: 18px 10px;
            align-items: stretch;
        }

        .auth-box {
            padding: 24px 16px;
            border-radius: 14px;
            max-width: none;
        }

        .auth-header h2 {
            font-size: 26px;
        }

        .btn-login,
        .form-group input {
            padding: 12px;
            font-size: 15px;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <div class="auth-header">
            <span class="admin-badge">ADMIN PORTAL</span>
            <h2>Admin Login</h2>
            <p>Enter your admin credentials</p>
        </div>
        
        <form method="POST" action="{{ url_for('admin_login_post') }}">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter admin email" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter admin password" required>
            </div>
            
            <button type="submit" class="btn-login">Login</button>
        </form>
        
        <div class="back-link">
            <a href="{{ url_for('index') }}"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>
</div>
{% endblock %}
