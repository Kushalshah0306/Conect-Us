<svg xmlns=""http://www.w3.org/2000/svg"" viewBox=""0 0 600 400"">
  <defs>
    <linearGradient id=""bg"" x1=""0"" y1=""0"" x2=""1"" y2=""1"">
      <stop offset=""0%"" stop-color=""#f8fafc""/>
      <stop offset=""100%"" stop-color=""#eef2ff""/>
    </linearGradient>
  </defs>
  <rect width=""600"" height=""400"" fill=""url(#bg)""/>
  <rect y=""300"" width=""600"" height=""100"" fill=""#f1f5f9""/>
  <circle cx=""180"" cy=""140"" r=""30"" fill=""#1f2937""/>
  <rect x=""160"" y=""170"" width=""40"" height=""90"" rx=""16"" fill=""#1f2937""/>
  <rect x=""140"" y=""210"" width=""80"" height=""16"" rx=""8"" fill=""#1f2937""/>
  <rect x=""220"" y=""180"" width=""18"" height=""110"" rx=""9"" fill=""#6b7280""/>
  <rect x=""238"" y=""190"" width=""120"" height=""20"" rx=""10"" fill=""#3b82f6""/>
  <g>
    <rect x=""360"" y=""200"" width=""140"" height=""16"" rx=""8"" fill=""#3b82f6""/>
    <rect x=""488"" y=""192"" width=""18"" height=""32"" rx=""8"" fill=""#475569""/>
